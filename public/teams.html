<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams — E-Sports Manager</title>
<link rel="stylesheet" href="style.css">
<style>
.team-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,border-color .2s}
.team-card:hover{transform:translateY(-3px);border-color:var(--border-bright)}
.team-card-header{padding:20px;background:linear-gradient(135deg,rgba(0,245,255,.07),transparent);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px}
.team-logo{width:56px;height:56px;border-radius:10px;background:rgba(0,245,255,.1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;flex-shrink:0}
.team-logo img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.team-name{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:1px;color:var(--text-primary)}
.team-meta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:3px;letter-spacing:1px}
.team-stats{display:flex;border-bottom:1px solid var(--border)}
.team-stat{flex:1;padding:12px;text-align:center;border-right:1px solid var(--border)}
.team-stat:last-child{border-right:none}
.team-stat-val{font-family:var(--font-display);font-size:20px;color:var(--neon-cyan)}
.team-stat-lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-top:2px}
.team-members-list{padding:14px 16px;display:flex;flex-wrap:wrap;gap:6px;min-height:50px;border-bottom:1px solid var(--border)}
.member-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.25);border-radius:20px;padding:4px 10px;font-size:12px}
.rm-btn{background:none;border:none;color:#ff5555;cursor:pointer;font-size:15px;line-height:1;padding:0 0 0 2px}
.rm-btn:hover{opacity:.7}
.team-actions{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap}
.logo-preview{width:80px;height:80px;border-radius:10px;background:rgba(0,245,255,.05);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.logo-preview:hover{border-color:var(--neon-cyan)}
.logo-preview img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.members-checklist{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);background:rgba(0,0,0,.3)}
.mci{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.mci:last-child{border-bottom:none}
.mci:hover{background:rgba(0,245,255,.05)}
.mci input[type=checkbox]{width:16px;height:16px;accent-color:var(--neon-cyan);cursor:pointer;flex-shrink:0}
.mci label{cursor:pointer;font-size:14px;color:var(--text-primary);letter-spacing:0;text-transform:none;font-family:var(--font-body);flex:1}
.uname{font-family:var(--font-mono);font-size:11px;color:var(--neon-cyan)}
</style>
</head>
<body>
<div class="layout">
<div id="sidebar-mount"></div>
<main class="main-content fade-in">
  <div class="page-header">
    <div class="page-header-left">
      <div class="page-tag">// SQUAD MANAGEMENT</div>
      <h2 class="page-title">TEA<span>MS</span></h2>
      <p class="page-sub" id="team-count">Loading...</p>
    </div>
    <button class="btn btn-primary" onclick="openModal('add-team-modal')">+ Create Team</button>
  </div>
  <div id="alert-area" class="alert"></div>
  <div id="teams-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px">
    <div style="grid-column:1/-1"><div class="loading"><div class="spinner"></div> Loading teams...</div></div>
  </div>
</main>
</div>

<!-- CREATE TEAM MODAL -->
<div class="modal-overlay" id="add-team-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">CREATE NEW TEAM</span>
      <button class="modal-close" onclick="closeModal('add-team-modal')">x</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <div class="logo-preview" id="create-logo-preview" onclick="document.getElementById('c-logo-file').click()">🛡️</div>
        <div>
          <div style="font-family:var(--font-mono);font-size:11px;color:var(--neon-cyan);letter-spacing:1px;margin-bottom:6px">TEAM LOGO (optional)</div>
          <input type="file" id="c-logo-file" accept="image/*" style="display:none" onchange="previewCreate(this)">
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('c-logo-file').click()">Upload Image</button>
        </div>
      </div>
      <input type="hidden" id="create-logo-url">
      <div class="form-grid">
        <div class="form-group full">
          <label>Team Name *</label>
          <input type="text" id="t-name" placeholder="e.g. Phantom Strike">
        </div>
        <div class="form-group full">
          <label>Captain</label>
          <select id="t-captain"><option value="">-- Select Captain --</option></select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeModal('add-team-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="addTeam()">Create Team</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD MEMBERS MODAL -->
<div class="modal-overlay" id="add-members-modal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <span class="modal-title" id="add-members-title">ADD MEMBERS</span>
      <button class="modal-close" onclick="closeModal('add-members-modal')">x</button>
    </div>
    <div class="modal-body">
      <div id="alert-members" class="alert"></div>
      <input type="text" id="member-search" placeholder="Search players by name or username..."
        oninput="filterMemberList()"
        style="width:100%;padding:9px 14px;font-size:13px;margin-bottom:12px">
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:1px;margin-bottom:8px">
        SELECT PLAYERS TO ADD:
      </div>
      <div class="members-checklist" id="members-checklist">
        <div class="loading"><div class="spinner"></div></div>
      </div>
      <div style="margin-top:14px">
        <label>Role for all selected players</label>
        <select id="bulk-role" style="width:100%;margin-top:6px;padding:9px 14px;font-size:14px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary)">
          <option>Member</option>
          <option>Fragger</option>
          <option>Support</option>
          <option>IGL</option>
          <option>Sniper</option>
          <option>Entry</option>
          <option>Lurker</option>
          <option>Captain</option>
        </select>
      </div>
      <div class="form-actions" style="margin-top:16px">
        <button class="btn btn-outline" onclick="closeModal('add-members-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="addSelectedMembers()">Add Selected Players</button>
      </div>
    </div>
  </div>
</div>

<!-- CHANGE LOGO MODAL -->
<div class="modal-overlay" id="logo-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title" id="logo-modal-title">CHANGE LOGO</span>
      <button class="modal-close" onclick="closeModal('logo-modal')">x</button>
    </div>
    <div class="modal-body">
      <div id="alert-logo" class="alert"></div>
      <div style="display:flex;justify-content:center;margin-bottom:20px">
        <div class="logo-preview" id="update-logo-preview" onclick="document.getElementById('u-logo-file').click()" style="width:100px;height:100px;font-size:40px">🛡️</div>
      </div>
      <input type="file" id="u-logo-file" accept="image/*" style="display:none" onchange="previewUpdate(this)">
      <input type="hidden" id="update-logo-url">
      <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center">
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('u-logo-file').click()">Upload Image</button>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">OR paste URL below</span>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="update-logo-text" placeholder="https://example.com/logo.png" oninput="onLogoUrlInput(this.value)">
      </div>
      <div class="form-actions" style="margin-top:16px">
        <button class="btn btn-outline" onclick="closeModal('logo-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveLogo()">Save Logo</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
requireAuth();
document.getElementById('sidebar-mount').innerHTML = renderSidebar('Teams');

let selectedTeamId = null;
let availablePlayers = [];

async function loadTeams() {
  try {
    const teams = await apiGet('/teams');
    document.getElementById('team-count').textContent = teams.length + ' active teams';
    if (!teams.length) {
      document.getElementById('teams-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🛡️</div><p>No teams yet.</p></div>';
      return;
    }
    const withMembers = await Promise.all(teams.map(async t => {
      try { return Object.assign({}, t, { members: await apiGet('/teams/' + t.team_id + '/members') }); }
      catch { return Object.assign({}, t, { members: [] }); }
    }));
    document.getElementById('teams-grid').innerHTML = withMembers.map(buildCard).join('');
  } catch(e) {
    document.getElementById('teams-grid').innerHTML = '<div class="card" style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-family:var(--font-mono)">Server offline</div>';
  }
}

function esc(s){ return String(s).replace(/'/g,"\\'"); }

function buildCard(t) {
  var logoHTML = t.logo_url ? '<img src="' + t.logo_url + '" onerror="this.style.display=\'none\'">' : '🛡️';
  var membersHTML = t.members.length
    ? t.members.map(function(m){ return '<div class="member-tag">👤 <strong>' + m.name + '</strong><span class="uname">&nbsp;' + m.role + '</span><button class="rm-btn" onclick="removeMember(' + t.team_id + ',\'' + esc(t.team_name) + '\',' + m.player_id + ',\'' + esc(m.name) + '\')">×</button></div>'; }).join('')
    : '<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">No members — click Add Members</span>';

  return '<div class="team-card" id="tcard-' + t.team_id + '">' +
    '<div class="team-card-header"><div class="team-logo">' + logoHTML + '</div><div><div class="team-name">' + t.team_name + '</div><div class="team-meta">ID #' + t.team_id + ' · Captain: ' + (t.captain_name || '—') + '</div></div></div>' +
    '<div class="team-stats"><div class="team-stat"><div class="team-stat-val">' + t.member_count + '</div><div class="team-stat-lbl">Members</div></div><div class="team-stat"><div class="team-stat-val" style="color:var(--neon-green);font-size:12px">' + fmtDate(t.created_at) + '</div><div class="team-stat-lbl">Created</div></div></div>' +
    '<div class="team-members-list">' + membersHTML + '</div>' +
    '<div class="team-actions">' +
      '<button class="btn btn-outline btn-sm" onclick="openAddMembers(' + t.team_id + ',\'' + esc(t.team_name) + '\')">+ Add Members</button>' +
      '<button class="btn btn-outline btn-sm" onclick="openLogoModal(' + t.team_id + ',\'' + esc(t.team_name) + '\',\'' + (t.logo_url||'') + '\')">🖼️ Change Logo</button>' +
      '<button class="btn btn-danger btn-sm" onclick="deleteTeam(' + t.team_id + ',\'' + esc(t.team_name) + '\')">🗑️ Delete</button>' +
    '</div></div>';
}

async function addTeam() {
  var body = { team_name: document.getElementById('t-name').value.trim(), captain_id: document.getElementById('t-captain').value || null, logo_url: document.getElementById('create-logo-url').value || null };
  if (!body.team_name) return showAlert('alert-area','Team name is required.','error');
  try {
    await apiPost('/teams', body);
    closeModal('add-team-modal');
    showAlert('alert-area','Team "' + body.team_name + '" created!');
    document.getElementById('t-name').value = '';
    document.getElementById('create-logo-url').value = '';
    document.getElementById('create-logo-preview').innerHTML = '🛡️';
    loadTeams();
  } catch(e) { showAlert('alert-area','Error: ' + e.message,'error'); }
}

function previewCreate(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('create-logo-preview').innerHTML = '<img src="' + e.target.result + '">';
    document.getElementById('create-logo-url').value = e.target.result;
  };
  reader.readAsDataURL(file);
}

function previewUpdate(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('update-logo-preview').innerHTML = '<img src="' + e.target.result + '">';
    document.getElementById('update-logo-url').value = e.target.result;
    document.getElementById('update-logo-text').value = '';
  };
  reader.readAsDataURL(file);
}

function onLogoUrlInput(url) {
  document.getElementById('update-logo-url').value = url;
  if (url) document.getElementById('update-logo-preview').innerHTML = '<img src="' + url + '" onerror="this.parentNode.textContent=\'❌\'">';
}

function openLogoModal(teamId, teamName, currentLogo) {
  selectedTeamId = teamId;
  document.getElementById('logo-modal-title').textContent = 'LOGO — ' + teamName;
  document.getElementById('update-logo-url').value = currentLogo;
  document.getElementById('update-logo-text').value = currentLogo;
  document.getElementById('update-logo-preview').innerHTML = currentLogo ? '<img src="' + currentLogo + '">' : '🛡️';
  openModal('logo-modal');
}

async function saveLogo() {
  var logo_url = document.getElementById('update-logo-url').value.trim();
  if (!logo_url) return showAlert('alert-logo','Upload an image or paste a URL first.','error');
  try {
    await apiFetch('/teams/' + selectedTeamId + '/logo', { method:'PUT', body: JSON.stringify({ logo_url: logo_url }) });
    closeModal('logo-modal');
    showAlert('alert-area','Logo updated!');
    loadTeams();
  } catch(e) { showAlert('alert-logo','Error: ' + e.message,'error'); }
}

async function openAddMembers(teamId, teamName) {
  selectedTeamId = teamId;
  document.getElementById('add-members-title').textContent = 'ADD MEMBERS — ' + teamName;
  document.getElementById('members-checklist').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('member-search').value = '';
  openModal('add-members-modal');
  try {
    availablePlayers = await apiGet('/teams/' + teamId + '/available-players');
    renderChecklist(availablePlayers);
  } catch(e) {
    document.getElementById('members-checklist').innerHTML = '<div style="padding:16px;font-family:var(--font-mono);font-size:12px;color:#ff5555">Error loading players</div>';
  }
}

function renderChecklist(list) {
  if (!list.length) {
    document.getElementById('members-checklist').innerHTML = '<div style="padding:16px;font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">All players are already in this team.</div>';
    return;
  }
  document.getElementById('members-checklist').innerHTML = list.map(function(p){
    return '<div class="mci"><input type="checkbox" id="chk-' + p.player_id + '" value="' + p.player_id + '"><label for="chk-' + p.player_id + '">' + p.name + ' <span class="uname">@' + p.username + '</span></label></div>';
  }).join('');
}

function filterMemberList() {
  var q = document.getElementById('member-search').value.toLowerCase();
  renderChecklist(availablePlayers.filter(function(p){ return p.name.toLowerCase().includes(q) || p.username.toLowerCase().includes(q); }));
}

async function addSelectedMembers() {
  var checked = Array.from(document.querySelectorAll('#members-checklist input:checked'));
  if (!checked.length) return showAlert('alert-members','Select at least one player.','error');
  var role = document.getElementById('bulk-role').value;
  var ok = 0, fail = 0;
  for (var i = 0; i < checked.length; i++) {
    try { await apiPost('/teams/' + selectedTeamId + '/members', { player_id: checked[i].value, role: role }); ok++; }
    catch(e) { fail++; }
  }
  closeModal('add-members-modal');
  showAlert('alert-area', ok + ' player(s) added!' + (fail ? ' ' + fail + ' failed.' : ''));
  loadTeams();
}

async function removeMember(teamId, teamName, playerId, playerName) {
  if (!confirm('Remove "' + playerName + '" from ' + teamName + '?')) return;
  try {
    var res = await fetch('http://localhost:3000/api/teams/' + teamId + '/members/' + playerId, { method:'DELETE', credentials:'include' });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);
    showAlert('alert-area', playerName + ' removed from ' + teamName);
    loadTeams();
  } catch(e) { showAlert('alert-area','Error: ' + e.message,'error'); }
}

async function deleteTeam(teamId, teamName) {
  if (!confirm('Delete team "' + teamName + '"? This cannot be undone.')) return;
  try {
    await apiDelete('/teams/' + teamId);
    showAlert('alert-area','Team "' + teamName + '" deleted.');
    loadTeams();
  } catch(e) { showAlert('alert-area','Error: ' + e.message,'error'); }
}

async function loadPlayersForSelect() {
  try {
    var players = await apiGet('/players');
    var sel = document.getElementById('t-captain');
    players.forEach(function(p){
      var opt = document.createElement('option');
      opt.value = p.player_id;
      opt.textContent = p.name + ' (@' + p.username + ')';
      sel.appendChild(opt);
    });
  } catch(e) {}
}

loadTeams();
loadPlayersForSelect();
</script>
</body>
</html>
