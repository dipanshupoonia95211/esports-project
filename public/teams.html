<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams — E-Sports Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
    <div id="sidebar-mount"></div>

    <main class="main-content fade-in">
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-tag">// SQUAD MANAGEMENT</div>
                <h2 class="page-title">TEA<span>MS</span></h2>
                <p class="page-sub" id="team-count">Loading…</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('add-team-modal')">
                ＋ Create Team
            </button>
        </div>

        <div id="alert-area" class="alert"></div>

        <!-- Team Cards Grid -->
        <div id="teams-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px">
            <div style="grid-column:1/-1"><div class="loading"><div class="spinner"></div> Loading teams…</div></div>
        </div>

        <!-- Team Members Table -->
        <div class="card" id="members-card" style="display:none;margin-top:24px">
            <div class="card-header">
                <span class="card-title" id="members-title">Team Members</span>
                <button class="btn btn-outline btn-sm" onclick="document.getElementById('members-card').style.display='none'">Close</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Player</th><th>Username</th><th>Role</th><th>Country</th><th>Joined</th></tr></thead>
                    <tbody id="members-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Add Team Modal -->
<div class="modal-overlay" id="add-team-modal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">CREATE NEW TEAM</span>
            <button class="modal-close" onclick="closeModal('add-team-modal')">×</button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Team Name *</label>
                    <input type="text" id="t-name" placeholder="e.g. Phantom Strike">
                </div>
                <div class="form-group full">
                    <label>Captain (Player ID)</label>
                    <select id="t-captain">
                        <option value="">— Select Captain —</option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-outline" onclick="closeModal('add-team-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="addTeam()">Create Team</button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
requireAuth();
document.getElementById('sidebar-mount').innerHTML = renderSidebar('Teams');

async function loadTeams() {
    try {
        const teams = await apiGet('/teams');
        document.getElementById('team-count').textContent = `${teams.length} active teams`;
        if (!teams.length) {
            document.getElementById('teams-grid').innerHTML =
                `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🛡️</div><p>No teams yet. Create one!</p></div>`;
            return;
        }
        document.getElementById('teams-grid').innerHTML = teams.map(t => `
            <div class="card" style="margin:0;cursor:pointer;transition:transform .2s,border-color .2s"
                 onmouseenter="this.style.transform='translateY(-3px)';this.style.borderColor='var(--border-bright)'"
                 onmouseleave="this.style.transform='';this.style.borderColor=''">
                <div class="card-header" style="background:linear-gradient(135deg,rgba(0,245,255,.06),transparent)">
                    <div>
                        <div style="font-family:var(--font-display);font-size:13px;letter-spacing:1px">${t.team_name}</div>
                        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:3px">
                            ID: #${t.team_id}
                        </div>
                    </div>
                    <span style="font-size:32px">🛡️</span>
                </div>
                <div class="card-body" style="padding:16px 20px">
                    <div style="display:flex;gap:20px;margin-bottom:14px">
                        <div>
                            <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:1px">CAPTAIN</div>
                            <div style="font-size:14px;font-weight:600;margin-top:3px">${t.captain_name || '—'}</div>
                        </div>
                        <div>
                            <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:1px">MEMBERS</div>
                            <div style="font-family:var(--font-display);font-size:20px;color:var(--neon-cyan);margin-top:1px">${t.member_count}</div>
                        </div>
                        <div>
                            <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:1px">SINCE</div>
                            <div style="font-size:13px;color:var(--text-secondary);margin-top:3px">${fmtDate(t.created_at)}</div>
                        </div>
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="viewMembers(${t.team_id},'${t.team_name}')">
                        View Roster
                    </button>
                </div>
            </div>`).join('');
    } catch(e) {
        document.getElementById('teams-grid').innerHTML =
            `<div class="card" style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-family:var(--font-mono)">⚠️ Server offline</div>`;
    }
}

async function loadPlayersForSelect() {
    try {
        const players = await apiGet('/players');
        const sel = document.getElementById('t-captain');
        players.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.player_id;
            opt.textContent = `${p.name} (@${p.username})`;
            sel.appendChild(opt);
        });
    } catch(e) {}
}

async function viewMembers(teamId, teamName) {
    document.getElementById('members-card').style.display = 'block';
    document.getElementById('members-title').textContent = `🛡️  ${teamName} — Roster`;
    document.getElementById('members-body').innerHTML = loadingRow(5);
    document.getElementById('members-card').scrollIntoView({ behavior:'smooth' });
    try {
        const members = await apiGet(`/teams/${teamId}/members`);
        if (!members.length) {
            document.getElementById('members-body').innerHTML = emptyRow(5, 'No members yet');
            return;
        }
        document.getElementById('members-body').innerHTML = members.map(m => `
            <tr>
                <td><strong>${m.name}</strong></td>
                <td style="font-family:var(--font-mono);color:var(--neon-cyan)">${m.username}</td>
                <td>${m.role ? `<span class="badge badge-muted">${m.role}</span>` : '—'}</td>
                <td class="muted">${m.country}</td>
                <td class="muted">${fmtDate(m.joined_date)}</td>
            </tr>`).join('');
    } catch(e) {
        document.getElementById('members-body').innerHTML = emptyRow(5, 'Error loading members');
    }
}

async function addTeam() {
    const body = {
        team_name:  document.getElementById('t-name').value.trim(),
        captain_id: document.getElementById('t-captain').value || null,
    };
    if (!body.team_name) return showAlert('alert-area', 'Team name is required.', 'error');
    try {
        await apiPost('/teams', body);
        closeModal('add-team-modal');
        showAlert('alert-area', `✅ Team "${body.team_name}" created!`);
        document.getElementById('t-name').value = '';
        document.getElementById('t-captain').value = '';
        loadTeams();
    } catch(e) {
        showAlert('alert-area', '❌ ' + e.message, 'error');
    }
}

loadTeams();
loadPlayersForSelect();
</script>
</body>
</html>
