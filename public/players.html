<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Players — E-Sports Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
    <div id="sidebar-mount"></div>

    <main class="main-content fade-in">
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-tag">// ROSTER MANAGEMENT</div>
                <h2 class="page-title">PLAY<span>ERS</span></h2>
                <p class="page-sub" id="player-count">Loading…</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('add-player-modal')">
                ＋ Add Player
            </button>
        </div>

        <div id="alert-area" class="alert"></div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">👤 All Players</span>
                <input type="text" id="search-box" placeholder="Search by name / username…"
                    style="width:220px;padding:7px 12px;font-size:13px"
                    oninput="filterTable()">
            </div>
            <div class="table-wrap">
                <table id="players-table">
                    <thead><tr>
                        <th>ID</th><th>Name</th><th>Username</th><th>Email</th>
                        <th>Age</th><th>Country</th><th>Team</th><th>Role</th><th>Actions</th>
                    </tr></thead>
                    <tbody id="players-body">
                        <tr><td colspan="9"><div class="loading"><div class="spinner"></div> Loading players…</div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Add Player Modal -->
<div class="modal-overlay" id="add-player-modal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">ADD NEW PLAYER</span>
            <button class="modal-close" onclick="closeModal('add-player-modal')">×</button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="p-name" placeholder="e.g. Rahul Sharma">
                </div>
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="p-username" placeholder="e.g. rahulOP">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="p-email" placeholder="rahul@gmail.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="p-phone" placeholder="10-digit number" maxlength="10">
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="p-age" placeholder="13–60" min="13" max="60">
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" id="p-country" value="India">
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-outline" onclick="closeModal('add-player-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="addPlayer()">Add Player</button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
requireAuth();
document.getElementById('sidebar-mount').innerHTML = renderSidebar('Players');

let allPlayers = [];

async function loadPlayers() {
    try {
        allPlayers = await apiGet('/players');
        document.getElementById('player-count').textContent = `${allPlayers.length} registered players`;
        renderPlayers(allPlayers);
    } catch(e) {
        document.getElementById('players-body').innerHTML = emptyRow(9, '⚠️ Server offline — start Node.js backend');
    }
}

function renderPlayers(list) {
    if (!list.length) {
        document.getElementById('players-body').innerHTML = emptyRow(9, 'No players found');
        return;
    }
    document.getElementById('players-body').innerHTML = list.map(p => `
        <tr>
            <td class="muted">#${p.player_id}</td>
            <td><strong>${p.name}</strong></td>
            <td style="font-family:var(--font-mono);color:var(--neon-cyan)">${p.username}</td>
            <td class="muted">${p.email}</td>
            <td>${p.age ?? '—'}</td>
            <td>${p.country}</td>
            <td>${p.team_name ? `<span class="badge badge-purple">${p.team_name}</span>` : '<span class="muted">—</span>'}</td>
            <td>${p.role ? `<span class="badge badge-muted">${p.role}</span>` : '—'}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="deletePlayer(${p.player_id}, '${p.name}')">Delete</button>
            </td>
        </tr>`).join('');
}

function filterTable() {
    const q = document.getElementById('search-box').value.toLowerCase();
    renderPlayers(allPlayers.filter(p =>
        p.name.toLowerCase().includes(q) || p.username.toLowerCase().includes(q)
    ));
}

async function addPlayer() {
    const body = {
        name:     document.getElementById('p-name').value.trim(),
        username: document.getElementById('p-username').value.trim(),
        email:    document.getElementById('p-email').value.trim(),
        phone:    document.getElementById('p-phone').value.trim(),
        age:      parseInt(document.getElementById('p-age').value) || null,
        country:  document.getElementById('p-country').value.trim() || 'India',
    };
    if (!body.name || !body.username || !body.email) {
        return showAlert('alert-area', 'Name, username, and email are required.', 'error');
    }
    try {
        await apiPost('/players', body);
        closeModal('add-player-modal');
        showAlert('alert-area', `✅ Player "${body.name}" added successfully!`);
        loadPlayers();
        ['p-name','p-username','p-email','p-phone','p-age'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('p-country').value = 'India';
    } catch(e) {
        showAlert('alert-area', '❌ ' + e.message, 'error');
    }
}

async function deletePlayer(id, name) {
    if (!confirm(`Delete player "${name}"?`)) return;
    try {
        await apiDelete('/players/' + id);
        showAlert('alert-area', `🗑️ Player "${name}" deleted.`);
        loadPlayers();
    } catch(e) {
        showAlert('alert-area', '❌ ' + e.message, 'error');
    }
}

loadPlayers();
</script>
</body>
</html>
