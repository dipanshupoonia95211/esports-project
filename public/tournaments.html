<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournaments — E-Sports Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
    <div id="sidebar-mount"></div>

    <main class="main-content fade-in">
        <div class="page-header">
            <div class="page-header-left">
                <div class="page-tag">// TOURNAMENT CONTROL</div>
                <h2 class="page-title">TOURN<span>AMENTS</span></h2>
                <p class="page-sub" id="t-count">Loading…</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('add-tourn-modal')">
                ＋ New Tournament
            </button>
        </div>

        <div id="alert-area" class="alert"></div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">🏆 All Tournaments</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr>
                        <th>ID</th><th>Tournament</th><th>Game</th><th>Start</th><th>End</th>
                        <th>Prize Pool</th><th>Teams</th><th>Matches</th><th>Sponsor</th><th>Status</th><th>Actions</th>
                    </tr></thead>
                    <tbody id="tourn-body">
                        <tr><td colspan="11"><div class="loading"><div class="spinner"></div> Loading…</div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Registration sub-section -->
        <div class="card" id="reg-card" style="display:none">
            <div class="card-header">
                <span class="card-title" id="reg-title">Register Team</span>
                <button class="btn btn-outline btn-sm" onclick="document.getElementById('reg-card').style.display='none'">Close</button>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Select Team</label>
                        <select id="reg-team-select">
                            <option value="">— Select Team —</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" onclick="registerTeam()">Register Team</button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Add Tournament Modal -->
<div class="modal-overlay" id="add-tourn-modal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">CREATE TOURNAMENT</span>
            <button class="modal-close" onclick="closeModal('add-tourn-modal')">×</button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Tournament Name *</label>
                    <input type="text" id="tn-name" placeholder="e.g. India Clash Championship">
                </div>
                <div class="form-group">
                    <label>Game *</label>
                    <input type="text" id="tn-game" placeholder="e.g. VALORANT">
                </div>
                <div class="form-group">
                    <label>Prize Pool (₹)</label>
                    <input type="number" id="tn-prize" placeholder="e.g. 1000000">
                </div>
                <div class="form-group">
                    <label>Start Date *</label>
                    <input type="date" id="tn-start">
                </div>
                <div class="form-group">
                    <label>End Date *</label>
                    <input type="date" id="tn-end">
                </div>
                <div class="form-group full">
                    <label>Sponsor</label>
                    <select id="tn-sponsor">
                        <option value="">— No Sponsor —</option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-outline" onclick="closeModal('add-tourn-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="addTournament()">Create</button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
requireAuth();
document.getElementById('sidebar-mount').innerHTML = renderSidebar('Tournaments');
let selectedTournamentId = null;

async function loadTournaments() {
    try {
        const list = await apiGet('/tournaments');
        document.getElementById('t-count').textContent = `${list.length} tournaments`;
        document.getElementById('tourn-body').innerHTML = list.map(t => `
            <tr>
                <td class="muted">#${t.tournament_id}</td>
                <td><strong>${t.tournament_name}</strong></td>
                <td><span class="badge badge-purple">${t.game_name}</span></td>
                <td class="muted">${fmtDate(t.start_date)}</td>
                <td class="muted">${fmtDate(t.end_date)}</td>
                <td style="color:var(--neon-cyan)">${fmtMoney(t.prize_pool)}</td>
                <td>${t.team_count}</td>
                <td>${t.match_count}</td>
                <td class="muted">${t.sponsor_name || '—'}</td>
                <td>${statusBadge(t.status)}</td>
                <td>
                    <button class="btn btn-outline btn-sm"
                        onclick="showRegisterPanel(${t.tournament_id}, '${t.tournament_name}')">
                        Register Team
                    </button>
                </td>
            </tr>`).join('') || `<tr><td colspan="11">${emptyRow(11)}</td></tr>`;
    } catch(e) {
        document.getElementById('tourn-body').innerHTML = emptyRow(11, '⚠️ Server offline');
    }
}

async function showRegisterPanel(tId, tName) {
    selectedTournamentId = tId;
    document.getElementById('reg-title').textContent = `📋  Register Team → ${tName}`;
    document.getElementById('reg-card').style.display = 'block';
    document.getElementById('reg-card').scrollIntoView({ behavior:'smooth' });
    // load teams
    try {
        const teams = await apiGet('/teams');
        const sel = document.getElementById('reg-team-select');
        sel.innerHTML = '<option value="">— Select Team —</option>';
        teams.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.team_id;
            opt.textContent = t.team_name;
            sel.appendChild(opt);
        });
    } catch(e) {}
}

async function registerTeam() {
    const team_id = document.getElementById('reg-team-select').value;
    if (!team_id) return showAlert('alert-area', 'Select a team first.', 'error');
    try {
        await apiPost(`/tournaments/${selectedTournamentId}/register`, { team_id });
        showAlert('alert-area', '✅ Team registered successfully!');
        document.getElementById('reg-card').style.display = 'none';
        loadTournaments();
    } catch(e) {
        showAlert('alert-area', '❌ ' + e.message, 'error');
    }
}

async function addTournament() {
    const body = {
        tournament_name: document.getElementById('tn-name').value.trim(),
        game_name:       document.getElementById('tn-game').value.trim(),
        start_date:      document.getElementById('tn-start').value,
        end_date:        document.getElementById('tn-end').value,
        prize_pool:      parseFloat(document.getElementById('tn-prize').value) || 0,
        sponsor_id:      document.getElementById('tn-sponsor').value || null,
    };
    if (!body.tournament_name || !body.game_name || !body.start_date || !body.end_date)
        return showAlert('alert-area', 'Fill all required fields.', 'error');
    try {
        await apiPost('/tournaments', body);
        closeModal('add-tourn-modal');
        showAlert('alert-area', `✅ Tournament "${body.tournament_name}" created!`);
        loadTournaments();
    } catch(e) {
        showAlert('alert-area', '❌ ' + e.message, 'error');
    }
}

async function loadSponsors() {
    try {
        const sponsors = await apiGet('/sponsors');
        const sel = document.getElementById('tn-sponsor');
        sponsors.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.sponsor_id;
            opt.textContent = `${s.sponsor_name} (${s.industry})`;
            sel.appendChild(opt);
        });
    } catch(e) {}
}

loadTournaments();
loadSponsors();
</script>
</body>
</html>
